name: Bao gia PC hang tuan

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài thư viện
        run: pip install -r requirements.txt

      - name: Chạy AI agent khảo giá và gửi báo cáo Lark
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
        run: python main.py

      - name: Lưu lịch sử giá vào repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          git diff --staged --quiet || git commit -m "Cap nhat lich su gia $(date +%F)"
          git push
